# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Cold Email Persona Evaluation - 22 Personas x Canary Fixtures"

# --- Prompt function assembles base + persona module dynamically ---
prompts:
  - file://generate_prompt.js

# --- Generation provider (the model under test) ---
providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    label: "Claude Sonnet 4"
    config:
      temperature: 0.7
      max_tokens: 4096

# --- Grading provider for LLM-judge assertions ---
defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-sonnet-4-20250514
      config:
        temperature: 0
        max_tokens: 1024
  assert:
    # =============================================
    # Layer 1: Deterministic checks (free, instant)
    # =============================================
    - type: javascript
      value: file://assertions/deterministic_checks.js

    - type: javascript
      value: file://assertions/no_hallucinated_numbers.js

    - type: javascript
      value: file://assertions/cross_email_checks.js

    # Banned CTA / spam phrases
    - type: not-icontains-any
      value:
        - "Dear Sir/Madam"
        - "unsubscribe"
        - "[placeholder]"
        - "click here"
        - "book a meeting"
        - "schedule a call"
        - "limited time"
        - "act now"
        - "sign up now"
        - "buy now"
        - "free trial"

    # Cost gate per generation call
    - type: cost
      threshold: 0.05

    # =============================================
    # Layer 2: LLM-as-judge rubrics (binary pass/fail)
    # =============================================
    - type: llm-rubric
      value: |
        Evaluate PERSONA FIDELITY. The output is a cold email sequence generated
        for the persona "{{persona}}". Does every email consistently reflect the
        priorities, vocabulary, and concerns appropriate for that buyer persona?
        A {{seniority}}-level {{department}} buyer should see language that matches
        their daily reality. Score 1.0 if the persona is consistently maintained,
        0.0 if any email breaks character.
      weight: 3
      metric: persona_fidelity
      threshold: 0.7

    - type: llm-rubric
      value: |
        Evaluate TONE MATCH. The expected tone is: "{{tone}}".
        Does the email sequence match this tone throughout? Check for appropriate
        formality level, technical depth, and communication style. Score 1.0 if
        tone is consistent and correct, 0.0 if it drifts or mismatches.
      weight: 2
      metric: tone_match
      threshold: 0.7

    - type: llm-rubric
      value: |
        Check ANTI-PATTERN COMPLIANCE. The email sequence must NOT contain:
        - Fake urgency ("limited time", "act now", "don't miss out")
        - Superlatives ("best", "leading", "world-class", "#1")
        - Presumptuous familiarity ("I know you're busy", "I'm sure you agree")
        - Generic value propositions with no prospect-specific data
        - Multiple CTAs per email
        - Placeholder brackets like [Company] or [Name]
        - "Dear Sir/Madam" or equivalent generic salutations
        Score 1.0 if compliant, 0.0 if any anti-pattern is present.
      weight: 3
      metric: anti_pattern_compliance
      threshold: 1.0

# --- Derived composite metric ---
derivedMetrics:
  - name: "overall_quality"
    value: "(persona_fidelity * 0.4 + tone_match * 0.3 + anti_pattern_compliance * 0.3)"

# --- Test matrix: one entry per canary fixture ---
tests:
  - vars:
      persona: "executive"
      fixture: file://../../canary/fixtures/executive.json
